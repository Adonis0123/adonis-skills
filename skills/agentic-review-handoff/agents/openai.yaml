interface:
  display_name: "Agentic Review Handoff"
  short_description: "Run review-fix-re-review loops across agents."
  default_prompt: "Use $agentic-review-handoff for the current stage: review, fix, or re-review. If reviewing, verify team/reviewer feedback with first principles, DDD, high-cohesion/low-coupling checks, and official sources when external APIs, frameworks, browsers, security, payments, or platforms are involved. If fixing, only fix validated findings and end with a Fix Completion Packet whose first section is Fix Conclusion. If re-reviewing, do a scoped re-review of prior findings and nearby regressions only."
